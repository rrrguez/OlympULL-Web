version: "3.9"

services:

  nginx:
    image: nginx:alpine
    container_name: olympull_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./uploads:/uploads
    depends_on:
      - frontend
      - backend
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_BACKEND_URL: /api
    container_name: olympull_frontend
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: olympull_backend
    volumes:
      - ./uploads:/app/uploads
      - ./secrets:/app/keys:ro
    env_file:
      - ./backend/.env
    depends_on:
      - db
    restart: always

  db:
    build: ./db
    container_name: olympull_db
    volumes:
      - olympull-data:/var/lib/postgresql/data
    restart: always

volumes:
  olympull-data:
